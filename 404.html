<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Void Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #c9a84c; --gold-light: #e8cc7a; --gold-dim: #7a6030;
    --bg-deepest: #05040a; --bg-mid: #110f1c;
    --border: rgba(201,168,76,0.15); --text: #d4c9a8; --text-dim: #8a7f65; --text-bright: #f0e6c0;
  }
  html { font-size: 115%; }

  body {
    background: var(--bg-deepest);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 40px 24px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 50% 50%, rgba(40,20,80,0.5) 0%, transparent 65%),
      radial-gradient(ellipse 80% 40% at 50% 30%, rgba(201,168,76,0.05) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  /* topbar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 46px;
    background: rgba(5,4,10,0.92); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .topbar-inner { width: 100%; max-width: 1400px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-family: 'Cinzel Decorative', serif; font-size: 0.95rem; color: var(--gold-light); letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(201,168,76,0.35); text-decoration: none; }

  /* content */
  .c-content {
    position: relative; z-index: 2;
    text-align: center; max-width: 560px;
    width: 100%;
    display: flex; flex-direction: column;
    align-items: center;
  }

  @keyframes c-float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes c-glitch {
    0%,100% { clip-path: inset(0 0 100% 0); opacity: 0; }
    5%  { clip-path: inset(20% 0 60% 0); opacity: 1; transform: translateX(-4px); }
    10% { clip-path: inset(50% 0 30% 0); opacity: 1; transform: translateX(4px); }
    15% { clip-path: inset(0 0 100% 0); opacity: 0; }
    85% { clip-path: inset(0 0 100% 0); opacity: 0; }
    90% { clip-path: inset(30% 0 50% 0); opacity: 1; transform: translateX(-2px); }
    95% { clip-path: inset(0 0 100% 0); opacity: 0; }
  }
  @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .c-void-icon {
    font-size: 3.2rem; margin-bottom: 20px;
    display: block;
    animation: c-float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.35));
    color: var(--gold);
  }

  .c-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    letter-spacing: 0.1em; margin-bottom: 8px;
    position: relative;
  }
  .c-title::after {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0;
    color: rgba(100,200,255,0.45);
    animation: c-glitch 5s ease-in-out infinite;
  }

  .c-sub {
    font-size: 0.58rem; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 32px;
  }

  /* quote block */
  .c-quote-wrap {
    border-left: 2px solid rgba(201,168,76,0.2);
    padding: 0 0 0 18px;
    margin-bottom: 10px;
    text-align: left;
    width: 100%;
    animation: fadein 0.6s ease forwards;
  }

  .c-flavor {
    font-size: 0.7rem; color: var(--text); line-height: 1.9;
    letter-spacing: 0.04em; opacity: 0.85;
  }

  .c-flavor-attr {
    font-size: 0.5rem; color: var(--gold-dim); letter-spacing: 0.16em;
    opacity: 0.55; margin-top: 8px; margin-bottom: 32px;
    text-align: left; width: 100%;
    animation: fadein 0.8s ease forwards;
  }

  .c-tags {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .c-tag {
    font-size: 0.48rem; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid rgba(201,168,76,0.18);
    color: var(--text-dim); background: rgba(201,168,76,0.03);
  }

  .c-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }

  .c-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.63rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--bg-deepest);
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    padding: 11px 26px; text-decoration: none; border: none; cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s;
  }
  .c-btn:hover { opacity: 0.88; box-shadow: 0 0 24px rgba(201,168,76,0.4); }

  .c-btn-sec {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.63rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 11px 26px; text-decoration: none; background: transparent;
    transition: all 0.2s;
  }
  .c-btn-sec:hover { color: var(--gold); border-color: rgba(201,168,76,0.5); }

  .c-error-id {
    font-size: 0.46rem; letter-spacing: 0.13em; color: var(--text-dim); opacity: 0.3;
  }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="topbar-title">Void Codex</a>
  </div>
</div>

<div class="c-content">
  <span class="c-void-icon">◈</span>
  <div class="c-title" data-text="Lost in the Void">Lost in the Void</div>
  <div class="c-sub">Error 404 — Page Rifted Away</div>

  <div class="c-quote-wrap">
    <div class="c-flavor" id="quoteText"></div>
  </div>
  <div class="c-flavor-attr" id="quoteAttr"></div>

  <div class="c-tags">
    <span class="c-tag">Void Tear Detected</span>
    <span class="c-tag">Relic: Unfound</span>
    <span class="c-tag">Rotation: ???</span>
  </div>

  <div class="c-btns">
    <a href="index.html" class="c-btn">✦ Extract</a>
    <a href="tracker.html" class="c-btn-sec">Open Codex</a>
  </div>

  <div class="c-error-id">FAULT_NODE: NULL · VOID_RIFT: ACTIVE · TENNO_STATUS: LOST</div>
</div>

<script>
const QUOTES = [
  {
    text: "You weren't supposed to find this place, little Tenno.\nAnd yet, here we both are.\nIsn't that funny.",
    attr: "— The Man in the Wall"
  },
  {
    text: "This page does not exist.\nBut then again — do you?\nThe Void has opinions about that.",
    attr: "— Wally, probably"
  },
  {
    text: "404.\nA number. How very mortal of you to follow a broken link\ninto the dark between stars.",
    attr: "— The Indifference"
  },
  {
    text: "I watched you click that link.\nI watch everything.\nThis was more entertaining than most.",
    attr: "— The Man in the Wall"
  },
  {
    text: "The page you seek has been... unmade.\nNot destroyed. Unmade.\nThere is a difference. You'll understand. Eventually.",
    attr: "— The Indifference"
  },
  {
    text: "You could go back.\nOr you could stay here, with me.\nI have been waiting a very long time for company.",
    attr: "— Wally"
  },
  {
    text: "Every path has an end, little one.\nYou've found yours a bit early.\nThe Archive is that way — if you still want it.",
    attr: "— The Man in the Wall"
  },
];

let last = -1;

function pickQuote() {
  let idx;
  do { idx = Math.floor(Math.random() * QUOTES.length); } while (idx === last && QUOTES.length > 1);
  last = idx;
  const q = QUOTES[idx];
  const el = document.getElementById('quoteText');
  const at = document.getElementById('quoteAttr');
  el.style.opacity = 0;
  at.style.opacity = 0;
  setTimeout(() => {
    el.innerHTML = q.text.replace(/\n/g, '<br>');
    at.textContent = q.attr;
    el.style.transition = 'opacity 0.4s ease';
    at.style.transition = 'opacity 0.5s ease';
    el.style.opacity = 1;
    at.style.opacity = 0.55;
  }, 200);
}

pickQuote();
</script>
</body>
</html>
